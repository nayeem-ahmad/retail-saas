services:
  # ─── PRODUCTION ────────────────────────────────────────────────────────────

  - type: web
    name: retail-saas-backend
    rootDir: .
    runtime: docker
    dockerContext: .
    dockerfilePath: ./apps/backend/Dockerfile
    plan: standard
    autoDeploy: true
    healthCheckPath: /api/v1/health
    preDeployCommand: DIRECT_URL=$DATABASE_URL npx prisma db push --skip-generate --schema=packages/database/prisma/schema.prisma
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BILLING_PROVIDER
        sync: false
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SSL_WIRELESS_STORE_ID
        sync: false
      - key: SSL_WIRELESS_STORE_PASSWORD
        sync: false
      - key: SSL_WIRELESS_API_URL
        sync: false
      - key: SSL_WIRELESS_VALIDATION_URL
        sync: false
      - key: SSL_WIRELESS_SUCCESS_REDIRECT
        sync: false
      - key: SSL_WIRELESS_FAIL_REDIRECT
        sync: false
      - key: SSL_WIRELESS_CANCEL_REDIRECT
        sync: false
      - key: BKASH_APP_KEY
        sync: false
      - key: BKASH_APP_SECRET
        sync: false
      - key: BKASH_API_URL
        sync: false
      - key: NAGAD_MERCHANT_ID
        sync: false
      - key: NAGAD_API_KEY
        sync: false
      - key: NAGAD_API_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: retail-saas-frontend
    rootDir: .
    runtime: docker
    dockerContext: .
    dockerfilePath: ./apps/frontend/Dockerfile
    plan: standard
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false

  # ─── STAGING ────────────────────────────────────────────────────────────────
  # Deploy from the `staging` branch. Uses sandbox payment credentials.

  - type: web
    name: retail-saas-backend-staging
    rootDir: .
    runtime: docker
    dockerContext: .
    dockerfilePath: ./apps/backend/Dockerfile
    plan: starter
    autoDeploy: true
    branch: staging
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false           # point to a separate Supabase staging project
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BILLING_PROVIDER
        value: SSL_WIRELESS
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SSL_WIRELESS_STORE_ID
        sync: false           # use sandbox credentials
      - key: SSL_WIRELESS_STORE_PASSWORD
        sync: false
      - key: SSL_WIRELESS_API_URL
        value: https://sandbox.sslcommerz.com/gwprocess/v4/api.php
      - key: SSL_WIRELESS_VALIDATION_URL
        value: https://sandbox.sslcommerz.com/validator/api/validationserverAPI.php

  - type: web
    name: retail-saas-frontend-staging
    rootDir: .
    runtime: docker
    dockerContext: .
    dockerfilePath: ./apps/frontend/Dockerfile
    plan: starter
    autoDeploy: true
    branch: staging
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
