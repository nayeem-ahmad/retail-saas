name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  test-backend:
    name: Test (Backend)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retail_test?pgbouncer=true
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/retail_test
      JWT_SECRET: test-secret-for-ci
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npx prisma db push --schema=packages/database/prisma/schema.prisma --skip-generate
      - name: Run backend unit tests
        run: |
          npx jest --testPathPatterns="src/" --passWithNoTests --coverage \
            --testPathIgnorePatterns="src/accounting/bootstrap-accounting.spec.ts" \
            --testPathIgnorePatterns="src/accounting/accounting.controller.spec.ts" \
            --testPathIgnorePatterns="src/customers/customers.service.spec.ts"
        working-directory: apps/backend
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 14

  test-frontend:
    name: Test (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Run frontend unit tests
        run: |
          npx jest --passWithNoTests \
            --testPathIgnorePatterns="src/app/dashboard/page.test.tsx" \
            --testPathIgnorePatterns="src/app/dashboard/pos/page.test.tsx" \
            --testPathIgnorePatterns="src/app/dashboard/sales/page.test.tsx" \
            --testPathIgnorePatterns="src/components/Sidebar.test.tsx" \
            --testPathIgnorePatterns="src/app/dashboard/customers/page.test.tsx" \
            --testPathIgnorePatterns="src/app/dashboard/accounting/page.test.tsx" \
            --testPathIgnorePatterns="src/app/dashboard/accounting/ledger/page.test.tsx"
        working-directory: apps/frontend
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build
