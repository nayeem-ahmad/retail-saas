services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-erp71}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-erp71}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "4000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - "3000"

  # Standalone edge proxy. Disabled by default via a Compose profile because
  # on a shared host an existing reverse proxy already owns ports 80/443 and
  # routes app./api. to the frontend/backend containers. Enable for a
  # dedicated host with: `docker compose --profile standalone-edge up -d`.
  caddy:
    image: caddy:2.9-alpine
    profiles:
      - standalone-edge
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config: